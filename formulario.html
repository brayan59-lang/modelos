<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Observación Biológica</title>
    <link rel="stylesheet" href="form-style.css">
</head>
<body>

    <div class="form-card">
        <header class="form-header">
            <h2>Registro de Hallazgos</h2>
            <p>Colabora con nuestra base de datos sobre patrones de Fibonacci en la naturaleza.</p>
        </header>

        <form action="#" method="POST">
            <fieldset>
                <legend>Información del Investigador</legend>
                
                <div class="input-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Fibonacci de Pisa" required>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="investigador@ciencia.com" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Detalles de la Muestra</legend>

                <div class="input-group">
                    <label for="especie">Tipo de Organismo</label>
                    <select id="especie" name="especie">
                        <option value="planta">Planta / Flor</option>
                        <option value="molusco">Molusco / Concha</option>
                        <option value="insecto">Insecto / Animal</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="numero">Número de Fibonacci detectado</label>
                    <input type="number" id="numero" name="numero" min="1" placeholder="Ej. 13, 21, 34...">
                </div>

                <div class="input-group">
                    <label for="descripcion">Descripción de la observación</label>
                    <textarea id="descripcion" name="descripcion" rows="4" placeholder="Describe cómo se manifiesta la sucesión en este organismo..."></textarea>
                </div>
            </fieldset>

            <button type="submit" class="btn-submit">Enviar Registro</button>
        </form>
    </div>

</body>
</html>
